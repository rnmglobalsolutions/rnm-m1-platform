name: Auto PR

on:
  push:
    branches:
      - 'feature/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    name: Create PR to main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create PR if missing
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          existing_pr_count="$(gh pr list \
            --head "$BRANCH_NAME" \
            --base main \
            --state open \
            --json number \
            --jq 'length')"

          if [ "$existing_pr_count" -gt 0 ]; then
            echo "An open PR from $BRANCH_NAME to main already exists."
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "Merge $BRANCH_NAME" \
            --body "Automated PR from \`$BRANCH_NAME\` to \`main\`."
