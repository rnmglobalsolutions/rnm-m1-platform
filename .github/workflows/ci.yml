name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore RNM.Platform.sln

      - name: Build
        run: dotnet build RNM.Platform.sln --no-restore

      - name: Test
        run: dotnet test RNM.Platform.sln --no-build

      - name: Bicep validation
        run: az bicep build --file infra/main.bicep
